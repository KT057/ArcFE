name: VRT Publish

on:
  push:
    branches:
      - master
      - "feature/**"
      - "renovate/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vrt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch unshallow
        run: |
          git fetch --prune --unshallow

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Playwrightのブラウザバイナリを配置するディレクトリを環境変数に設定
      - run: echo "PLAYWRIGHT_BROWSERS_PATH=${HOME}/pw-browsers" >> "${GITHUB_ENV}"

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright
        with:
          node-version: 22
          playwright-browsers-path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}

      - name: workaround for detached HEAD
        run: |
          git checkout ${GITHUB_REF#refs/heads/} || git checkout -b ${GITHUB_REF#refs/heads/} && git pull

      - name: Test Storybook
        run: |
          pnpm --filter @packages/ui exec vitest --run \
            --pool=threads \
            --maxWorkers=$(nproc) \
            --project=storybook \
            --reporter=dot

      - name: Publish Reg Suit
        env:
          REG_NOTICE_CLIENT_ID: ${{ secrets.REG_NOTICE_CLIENT_ID }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          CLOUDFRONT_DOMAIN: ${{ secrets.CLOUDFRONT_DOMAIN }}
          REGION: ${{ secrets.REGION }}
        run: |
          # Clean working directory to avoid corrupted cache
          rm -rf packages/ui/.reg
          pnpm @ui reg-suit:run
